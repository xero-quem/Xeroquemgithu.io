<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Química v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #e8ecef; }
        #carta { width: 280px; height: 380px; background: white; border: 10px solid #2c3e50; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 100px; font-weight: bold; box-shadow: 0 15px 30px rgba(0,0,0,0.3); margin-bottom: 25px; color: #2c3e50; }
        .botones { display: flex; gap: 10px; }
        button { padding: 15px 25px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; transition: 0.2s; color: white; }
        #btn-sig { background-color: #27ae60; }
        #btn-sig:hover { background-color: #2ecc71; }
        #btn-reset { background-color: #e67e22; }
        #btn-reset:hover { background-color: #f39c12; }
        #contador { margin-top: 15px; font-size: 18px; color: #555; font-weight: bold; }
    </style>
</head>
<body>

    <div id="carta">?</div>
    
    <div class="botones">
        <button id="btn-sig" onclick="siguienteCarta()">Siguiente Carta</button>
        <button id="btn-reset" onclick="reiniciarJuego()">🔄 Barajar de nuevo</button>
    </div>
    
    <div id="contador">¡Presiona Siguiente para empezar!</div>

    <script>
        const elementos = ["H", "He", "Li", "Be", "B", "C", "N", "O", "F", "Ne", "Na", "Mg", "Al", "Si", "P", "S", "Cl", "Ar", "K", "Ca", "Sc", "Ti", "V", "Cr", "Mn", "Fe", "Co", "Ni", "Cu", "Zn", "Ga", "Ge", "As", "Se", "Br", "Kr", "Rb", "Sr", "Y", "Zr", "Nb", "Mo", "Tc", "Ru", "Rh", "Pd", "Ag", "Cd", "In", "Sn", "Sb", "Te", "I", "Xe", "Cs", "Ba", "La", "Ce", "Pr", "Nd", "Pm", "Sm", "Eu", "Gd", "Tb", "Dy", "Ho", "Er", "Tm", "Yb", "Lu", "Hf", "Ta", "W", "Re", "Os", "Ir", "Pt", "Au", "Hg", "Tl", "Pb", "Bi", "Po", "At", "Rn", "Fr", "Ra", "Ac", "Th", "Pa", "U", "Np", "Pu", "Am", "Cm", "Bk", "Cf", "Es", "Fm", "Md", "No", "Lr", "Rf", "Db", "Sg", "Bh", "Hs", "Mt", "Ds", "Rg", "Cn", "Nh", "Fl", "Mc", "Lv", "Ts", "Og"];
        
        let baraja = [];
        let indice = 0;

        function barajarAlgoritmo() {
            baraja = [...elementos];
            for (let i = baraja.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [baraja[i], baraja[j]] = [baraja[j], baraja[i]];
            }
            indice = 0;
        }

        function siguienteCarta() {
            if (indice >= elementos.length) {
                alert("¡Se acabaron los elementos! Barajando de nuevo...");
                reiniciarJuego();
                return;
            }
            document.getElementById('carta').innerText = baraja[indice];
            document.getElementById('contador').innerText = `Elemento ${indice + 1} de 118`;
            indice++;
        }

        function reiniciarJuego() {
            barajarAlgoritmo();
            document.getElementById('carta').innerText = "?";
            document.getElementById('contador').innerText = "¡Barajado! Presiona Siguiente";
        }

        // Barajar automáticamente al abrir la página
        barajarAlgoritmo();
    </script>
</body>
</html>
